</div>
<button class="material-symbols-outlined text-on-surface-variant hover:scale-105 transition-transform duration-200 active:translate-y-1">settings</button>
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-safe-margin pt-xl">

<div class="relative">
<span class="font-headline-lg text-[64px] font-extrabold text-primary-container drop-shadow-[0_8px_0_#003a5c] tracking-tighter uppercase block leading-none">

                </span>
<span class="font-headline-lg text-[48px] font-extrabold text-secondary drop-shadow-[0_6px_0_#410008] tracking-tighter uppercase block leading-none ml-lg">

                </span>
</div>
</div>

<span class="font-label-bold text-label-bold">IDENTIFYING</span>
</div>
</div>

<span class="font-body-md text-on-surface-variant opacity-70">Fetching player avatars...</span>
</div>
<div class="font-headline-md text-primary drop-shadow-sm">
                    78<span class="text-label-bold">%</span>
</div>
